function FadeIn({children,delay=0,className=''}){
  const ref=useRef(null);
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){setTimeout(()=>setVis(true),delay);obs.disconnect()}
    },{threshold:0.1});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[delay]);
  return <div ref={ref} className={`fi ${vis?'vis':''} ${className}`}>{children}</div>;
}

function Counter({target,decimals=0,duration=800,suffix='',prefix=''}){
  const[val,setVal]=useState(0);
  const ref=useRef(null);
  const started=useRef(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){
        started.current=true;
        const t0=Date.now();
        const go=()=>{
          const p=Math.min((Date.now()-t0)/duration,1);
          const ease=1-Math.pow(1-p,3);
          setVal(target*ease);
          if(p<1)requestAnimationFrame(go);
        };go();
      }
    },{threshold:0.3});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[target,duration]);
  return <span ref={ref}>{prefix}{val.toFixed(decimals)}{suffix}</span>;
}

function MiniSparkline({data,color='var(--gold)',h=28}){
  const mn=Math.min(...data),mx=Math.max(...data),range=mx-mn||1;
  return(
    <div className="spark-mini">
      {data.map((v,i)=>(
        <div key={i} className="spark-bar" style={{
          height:`${((v-mn)/range)*100}%`,
          background:i===data.length-1?color:`${color}44`,
          minHeight:'2px'
        }}/>
      ))}
    </div>
  );
}

function ProgressBar({value,max=100,color='var(--gold)'}){
  return(
    <div className="prog-bar">
      <div className="prog-fill" style={{width:`${(value/max)*100}%`,background:color}}/>
    </div>
  );
}

function probColor(p){
  if(p>=0.6)return'var(--red)';
  if(p>=0.25)return'var(--amber)';
  return'var(--green)';
}

function zColor(z){

  return{bg:'rgba(78,205,196,0.1)',text:'var(--cyan)'};
}

function riskColor(r){

    svg.append('path').datum(d3.geoGraticule().step([30,30])())
      .attr('d',d3.geoPath().projection(proj)).attr('fill','none')
      .attr('stroke','rgba(255,255,255,0.025)').attr('stroke-width',0.5);
    svg.append('path').datum({type:'Sphere'})
      .attr('d',d3.geoPath().projection(proj)).attr('fill','none')

function SankeyFlow({tension}){
  const svgRef=useRef(null);
  useEffect(()=>{
    if(!svgRef.current)return;
    const svg=d3.select(svgRef.current);
    svg.selectAll('*').remove();
    const w=svgRef.current.clientWidth||1000,h=420;
    const pL=170,pR=170,fw=w-pL-pR;
    const tMult=0.5+(tension/100)*1.0;
    const altBoost=1+(tension/100)*0.5;
    const tradDamp=1-(tension/100)*0.25;

    const sources=FLOW_SOURCES;
    const dests=FLOW_DESTS.map(d=>{
      const isAlt=['Art & Collectibles','Crypto','Prediction Markets','Other Alternatives'].includes(d.name);
      const isTrad=['Equities','Fixed Income','Real Estate'].includes(d.name);
      return{...d,adj:d.share*(isAlt?altBoost:isTrad?tradDamp:1)};
    });
    const totalAdj=dests.reduce((s,d)=>s+d.adj,0);
    const totalSrc=sources.reduce((s,d)=>s+d.base*tMult,0);

    const sGap=8,sTotal=h-(sources.length-1)*sGap;
    let sY=0;
    const sPos=sources.map(s=>{
      const sh=(s.base*tMult/totalSrc)*sTotal;
      const p={...s,y:sY,h:sh,mid:sY+sh/2,val:s.base*tMult};
      sY+=sh+sGap;return p;
    });

    const dGap=6,dTotal=h-(dests.length-1)*dGap;
    let dY=0;
    const dPos=dests.map(d=>{
      const dh=(d.adj/totalAdj)*dTotal;
      const p={...d,y:dY,h:dh,mid:dY+dh/2,_off:0};
      dY+=dh+dGap;return p;
    });

    const g=svg.append('g').attr('transform',`translate(${pL},0)`);

    sPos.forEach(src=>{
      let off=0;
      dPos.forEach(dst=>{
        const fh=src.h*(dst.adj/totalAdj);
        const dstVal=src.val*(dst.adj/totalAdj);
        const dstH=(dstVal/(totalSrc*dst.adj/totalAdj))*dst.h;
        const y0t=src.y+off,y0b=y0t+fh;
        const y1t=dst.y+dst._off,y1b=y1t+dstH;
        dst._off+=dstH;

        const path=`M0,${y0t} C${fw*0.4},${y0t} ${fw*0.6},${y1t} ${fw},${y1t} L${fw},${y1b} C${fw*0.6},${y1b} ${fw*0.4},${y0b} 0,${y0b} Z`;
        g.append('path').attr('d',path).attr('fill',src.color).attr('opacity',0.12+(tension/100)*0.12)
          .attr('stroke',src.color).attr('stroke-width',0.3).attr('stroke-opacity',0.2);
        off+=fh;
      });
    });

    // Source labels
    sPos.forEach(s=>{
      svg.append('text').attr('x',pL-12).attr('y',s.mid+4).attr('text-anchor','end')
        .attr('font-family',"'JetBrains Mono',monospace").attr('font-size','11px').attr('fill','rgba(232,230,227,0.6)').text(s.name);
      svg.append('text').attr('x',pL-12).attr('y',s.mid+18).attr('text-anchor','end')
        .attr('font-family',"'JetBrains Mono',monospace").attr('font-size','10px').attr('fill',s.color).attr('opacity',0.7)
        .text(`$${s.val.toFixed(1)}B`);
    });
    // Dest labels
    dPos.forEach(d=>{
      const isAlt=['Art & Collectibles','Crypto','Prediction Markets'].includes(d.name);
      svg.append('text').attr('x',pL+fw+12).attr('y',d.mid+4).attr('text-anchor','start')
        .attr('font-family',"'JetBrains Mono',monospace").attr('font-size','11px')
        .attr('fill',isAlt?'rgba(232,230,227,0.8)':'rgba(232,230,227,0.5)').text(d.name);
      svg.append('text').attr('x',pL+fw+12).attr('y',d.mid+18).attr('text-anchor','start')
        .attr('font-family',"'JetBrains Mono',monospace").attr('font-size','10px')
        .attr('fill',isAlt?'var(--gold)':'var(--text3)').attr('opacity',0.7)
        .text(`${(d.adj/totalAdj*100).toFixed(0)}%`);
    });
  },[tension]);
  return <svg ref={svgRef} style={{width:'100%',height:'420px'}}/>;
}

function ChokepointMap(){
  const svgRef=useRef(null);
  useEffect(()=>{
    if(!svgRef.current)return;
    const svg=d3.select(svgRef.current);
    svg.selectAll('*').remove();
    const w=svgRef.current.clientWidth||1100,h=360;
    const proj=d3.geoNaturalEarth1().scale(w/5.8).translate([w/2,h/2]);

    svg.append('path').datum(d3.geoGraticule().step([30,30])())
      .attr('d',d3.geoPath().projection(proj)).attr('fill','none')
      .attr('stroke','rgba(255,255,255,0.02)').attr('stroke-width',0.5);

    // Shipping lanes (simplified great circle approximations)
    const lanes=[
      [[1,104],[6,80],[12,44],[30,32],[35,25],[36,0],[48,-5]], // Asia-Europe via Suez
      [[1,104],[6,80],[-10,60],[-34,18],[0,-5],[35,-10],[48,-5]], // Asia-Europe via Cape
      [[35,140],[24,120],[22,114],[1,104]], // East Asian coastal
      [[30,32],[41,29],[43,28]], // Bosphorus approach
      [[25,56],[26,57],[27,57]], // Hormuz
    ];
    lanes.forEach(lane=>{
      const pts=lane.map(([lat,lon])=>proj([lon,lat])).filter(p=>p);
      if(pts.length<2)return;
      const line=d3.line().x(d=>d[0]).y(d=>d[1]).curve(d3.curveBasis);
      svg.append('path').attr('d',line(pts)).attr('fill','none')
        .attr('stroke','rgba(78,205,196,0.08)').attr('stroke-width',2).attr('stroke-dasharray','4,8');
    });

    CHOKEPOINTS.forEach((cp,i)=>{
      const[x,y]=proj([cp.lon,cp.lat]);
      if(!x)return;
      const col=riskColor(cp.risk);

      // Glow
      const grad=svg.append('defs').append('radialGradient').attr('id',`cp-${i}`);
      grad.append('stop').attr('offset','0%').attr('stop-color',col).attr('stop-opacity',cp.risk==='Critical'?0.2:0.1);
      grad.append('stop').attr('offset','100%').attr('stop-color',col).attr('stop-opacity',0);
      svg.append('circle').attr('cx',x).attr('cy',y).attr('r',25).attr('fill',`url(#cp-${i})`);

      // Dot
      svg.append('circle').attr('cx',x).attr('cy',y).attr('r',4).attr('fill',col).attr('opacity',0.9);
      if(cp.risk!=='Normal'){
        const p2=svg.append('circle').attr('cx',x).attr('cy',y).attr('r',4).attr('fill','none')
          .attr('stroke',col).attr('stroke-width',1).attr('opacity',0);
        function doPulse(){
          p2.attr('r',4).attr('opacity',0.5)
            .transition().duration(1800).delay(i*150)
            .attr('r',16).attr('opacity',0).on('end',doPulse);
        }
        doPulse();
      }

      // Label
      svg.append('text').attr('x',x+(x>w/2?-8:8)).attr('y',y-10)
        .attr('text-anchor',x>w/2?'end':'start')
        .attr('font-family',"'JetBrains Mono',monospace").attr('font-size','9px')
        .attr('fill','rgba(232,230,227,0.5)').attr('letter-spacing','1px')
        .text(cp.name);
    });
  },[]);
  return <svg ref={svgRef} style={{width:'100%',height:'360px'}}/>;
}
