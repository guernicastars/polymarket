# Experiment 1: Matrix Games with Diverse Observations
experiment:
  name: "matrix_games_diverse_obs"
  description: "Show diverse agents cooperate faster in IPD/Stag Hunt"
  n_seeds: 5

game:
  type: "ipd"  # ipd, stag_hunt, coordination
  n_agents: 3
  history_length: 5
  n_episodes: 500
  episode_length: 100

agents:
  observation_types: ["temporal", "statistical", "relative"]
  hidden_dim: 32
  lr: 0.001
  gamma: 0.99
  entropy_coef: 0.01

baselines:
  - name: "homogeneous_temporal"
    observation_types: ["temporal", "temporal", "temporal"]
  - name: "homogeneous_statistical"
    observation_types: ["statistical", "statistical", "statistical"]

logging:
  wandb_project: "marl-epistemic"
  log_interval: 10
  save_interval: 100

analysis:
  blind_spot_threshold: 0.1
  cooperation_window: 50
