# Experiment 3: Multi-Agent Contextual Bandits
experiment:
  name: "contextual_bandits_diversity"
  description: "Show diversity shrinks collective blind spot"
  n_seeds: 5

bandit:
  context_dim: 20
  n_arms: 10
  noise_std: 0.1
  component_weights:
    linear: 0.3
    local: 0.25
    longrange: 0.25
    interaction: 0.2

agents:
  architectures: ["linear", "mlp", "cnn", "attention"]
  hidden_dim: 128
  embed_dim: 32
  n_channels: 32
  dropout_rate: 0.1

training:
  n_steps: 10000
  batch_size: 32
  lr: 0.001

lola:
  lr: 0.001
  lola_weight: 1.0
  max_grad_norm: 5.0

evidence_lola:
  lr: 0.001
  lola_weight: 1.0
  mu_ev: 0.1
  evidence_method: "mc_dropout"
  max_grad_norm: 5.0

conditions:
  - name: "single_best"
    type: "single"
    architecture: "mlp"
  - name: "homogeneous_4"
    type: "homogeneous"
    architecture: "mlp"
    n_agents: 4
  - name: "diverse_4"
    type: "diverse"
    architectures: ["linear", "mlp", "cnn", "attention"]
  - name: "diverse_keynesian"
    type: "diverse_keynesian"
    architectures: ["linear", "mlp", "cnn", "attention"]
    evidence_method: "mc_dropout"
  - name: "diverse_evidence_lola"
    type: "diverse_evidence_lola"
    architectures: ["linear", "mlp", "cnn", "attention"]

logging:
  wandb_project: "marl-epistemic"
  log_interval: 100

analysis:
  blind_spot_threshold: 0.1
  complementarity_eval_interval: 500
