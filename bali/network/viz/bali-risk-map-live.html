<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bali Real Estate Risk Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; }
  #map { width: 100%; height: 100vh; }

  .info-panel {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: rgba(10,10,15,0.95); border: 1px solid #1e1e2e; border-radius: 12px;
    padding: 16px; width: 340px; max-height: 90vh; overflow-y: auto;
    backdrop-filter: blur(10px);
  }
  .info-panel h2 { font-size: 18px; margin-bottom: 8px; color: #00d4aa; }
  .info-panel h3 { font-size: 14px; margin: 12px 0 6px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid #1a1a2a; }
  .stat-label { color: #888; }
  .stat-value { font-weight: 600; }

  .risk-bar { height: 8px; border-radius: 4px; background: #1a1a2a; margin: 4px 0; overflow: hidden; }
  .risk-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

  .grade { display: inline-block; padding: 2px 10px; border-radius: 6px; font-weight: 700; font-size: 20px; }
  .grade-A { background: #00d4aa20; color: #00d4aa; }
  .grade-B { background: #4ecdc420; color: #4ecdc4; }
  .grade-C { background: #ffe66d20; color: #ffe66d; }
  .grade-D { background: #ff884420; color: #ff8844; }
  .grade-F { background: #ff446620; color: #ff4466; }

  .legend {
    position: absolute; bottom: 20px; left: 10px; z-index: 1000;
    background: rgba(10,10,15,0.95); border: 1px solid #1e1e2e; border-radius: 10px;
    padding: 12px 16px;
  }
  .legend h4 { font-size: 12px; color: #888; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin: 3px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  .controls {
    position: absolute; top: 10px; left: 60px; z-index: 1000;
    display: flex; gap: 8px;
  }
  .controls button {
    background: rgba(10,10,15,0.95); border: 1px solid #1e1e2e; color: #e0e0e0;
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: all 0.2s;
  }
  .controls button:hover, .controls button.active { background: #00d4aa20; border-color: #00d4aa; color: #00d4aa; }

  .search-box {
    position: absolute; top: 60px; left: 60px; z-index: 1000;
    background: rgba(10,10,15,0.95); border: 1px solid #1e1e2e; border-radius: 8px;
    padding: 8px 12px; width: 220px;
  }
  .search-box input {
    background: transparent; border: none; color: #e0e0e0; width: 100%;
    font-size: 13px; outline: none;
  }
  .search-box input::placeholder { color: #555; }

  .tooltip-custom {
    background: rgba(10,10,15,0.95) !important; border: 1px solid #1e1e2e !important;
    color: #e0e0e0 !important; border-radius: 8px !important; padding: 8px 12px !important;
    font-family: -apple-system, sans-serif !important; font-size: 12px !important;
  }
  .tooltip-custom .leaflet-tooltip-tip { display: none; }
</style>
</head>
<body>
<div id="map"></div>

<div class="controls">
  <button class="active" onclick="setLayer('risk')">Risk Score</button>
  <button onclick="setLayer('price')">Land Price</button>
  <button onclick="setLayer('tourism')">Tourism</button>
  <button onclick="setLayer('volcanic')">Volcanic</button>
  <button onclick="setLayer('network')">Network</button>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search district..." oninput="filterDistricts(this.value)">
</div>

<div class="legend" id="legend">
  <h4>Investment Grade</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#00d4aa"></div> A — Excellent (0-25)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4"></div> B — Good (25-40)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffe66d"></div> C — Moderate (40-55)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8844"></div> D — High Risk (55-70)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff4466"></div> F — Extreme (70+)</div>
</div>

<div class="info-panel" id="info-panel">
  <h2>Bali Risk Intelligence</h2>
  <p style="font-size:13px;color:#888;margin-bottom:12px">Click a district to view risk assessment</p>
  <div class="stat-row"><span class="stat-label">Districts</span><span class="stat-value" id="stat-districts">57</span></div>

  <div class="stat-row"><span class="stat-label">Risk Model</span><span class="stat-value">4 categories</span></div>
  <div id="district-detail"></div>
</div>

// Volcano markers
const volcanoes = [
  { name: 'Mt. Agung', lat: -8.3433, lng: 115.5083, elev: 3142 },

  L.circleMarker([v.lat, v.lng], {
    radius: 10, fillColor: '#ff4466', color: '#ff4466', weight: 2, fillOpacity: 0.8,
  }).bindTooltip(`🌋 ${v.name} (${v.elev}m)`, { className: 'tooltip-custom' })

  // Danger zones (4km, 8km, 15km)
  [4000, 8000, 15000].forEach((r, i) => {
    L.circle([v.lat, v.lng], {
      radius: r, fillColor: '#ff4466', color: '#ff4466',
      weight: 1, fillOpacity: 0.08 - i * 0.02, dashArray: '4 4',
    }).addTo(volcanoLayer);
  });
});
volcanoLayer.addTo(map);

// Color scales
function riskColor(score) {
  if (score < 25) return '#00d4aa';
  if (score < 40) return '#4ecdc4';
  if (score < 55) return '#ffe66d';
  if (score < 70) return '#ff8844';
  return '#ff4466';
}

function priceColor(price) {
  if (price > 5000) return '#ff4466';
  if (price > 2000) return '#ff8844';
  if (price > 1000) return '#ffe66d';
  if (price > 500) return '#4ecdc4';
  return '#00d4aa';
}

function tourismColor(intensity) {
  if (intensity > 0.8) return '#ff4466';
  if (intensity > 0.6) return '#ff8844';
  if (intensity > 0.4) return '#ffe66d';
  if (intensity > 0.2) return '#4ecdc4';
  return '#00d4aa';
}

let districtMarkers = [];
let edgeLines = [];
let activeLayer = 'risk';

function getColor(d, layer) {
  switch(layer) {
    case 'risk': return riskColor(d.composite_risk || 50);
    case 'price': return priceColor(d.avg_land_price_usd_m2 || 0);
    case 'tourism': return tourismColor(d.tourism_intensity || 0);
    case 'volcanic': return riskColor(Math.max(0, 100 - (d.volcanic_proximity_km || 50) * 2));
    default: return '#00d4aa';
  }
}

function getRadius(d, layer) {
  if (layer === 'price') return Math.max(6, Math.min(20, Math.sqrt(d.avg_land_price_usd_m2 || 0) / 4));
  if (layer === 'tourism') return Math.max(6, d.tourism_intensity * 18);
  return Math.max(6, Math.min(18, (d.composite_risk || 50) / 5));
}

function renderDistricts() {
  districtMarkers.forEach(m => map.removeLayer(m));
  districtMarkers = [];

  DISTRICTS.forEach(d => {
    const color = getColor(d, activeLayer);
    const radius = getRadius(d, activeLayer);

    const marker = L.circleMarker([d.lat, d.lng], {
      radius, fillColor: color, color: color, weight: 2, fillOpacity: 0.7,
    });

    marker.bindTooltip(
      `<b>${d.name}</b> (${d.regency})<br>` +
      `Risk: ${d.composite_risk?.toFixed(1) || '—'} | Grade: ${d.investment_grade || '—'}<br>` +
      `Price: $${(d.avg_land_price_usd_m2 || 0).toLocaleString()}/m²`,
      { className: 'tooltip-custom', sticky: true }
    );

    marker.on('click', () => showDistrictDetail(d));
    marker.addTo(map);
    marker.districtData = d;
    districtMarkers.push(marker);
  });
}

function renderEdges() {
  edgeLines.forEach(l => map.removeLayer(l));
  edgeLines = [];

  if (activeLayer !== 'network') return;

  const districtMap = {};
  DISTRICTS.forEach(d => districtMap[d.id] = d);

  // Render edges from data
  (window.EDGES || []).forEach(e => {
    const src = districtMap[e.source];
    const tgt = districtMap[e.target];
    if (!src || !tgt) return;

    const typeColors = {
      road: '#333',
      shared_risk_zone: '#ff446666',
      economic_tie: '#00d4aa44',
    };

    const line = L.polyline(
      [[src.lat, src.lng], [tgt.lat, tgt.lng]],
      { color: typeColors[e.edge_type] || '#222', weight: 1.5, opacity: 0.6 }
    ).addTo(map);
    edgeLines.push(line);
  });
}

function setLayer(layer) {
  activeLayer = layer;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderDistricts();
  renderEdges();
}

function showDistrictDetail(d) {
  const grade = d.investment_grade || 'C';
  const gradeClass = `grade-${grade}`;

  document.getElementById('district-detail').innerHTML = `
    <h3 style="color:#00d4aa;margin-top:16px">${d.name}</h3>
    <div class="stat-row"><span class="stat-label">Regency</span><span class="stat-value">${d.regency}</span></div>
    <div class="stat-row"><span class="stat-label">Investment Grade</span><span class="grade ${gradeClass}">${grade}</span></div>
    <div class="stat-row"><span class="stat-label">Composite Risk</span><span class="stat-value">${d.composite_risk?.toFixed(1) || '—'}/100</span></div>

    <h3>Risk Breakdown</h3>
    ${riskBar('Environmental', d.env_risk)}
    ${riskBar('Seismological', d.seismic_risk)}
    ${riskBar('Legal', d.legal_risk)}
    ${riskBar('Administrative', d.admin_risk)}

    <h3>District Profile</h3>
    <div class="stat-row"><span class="stat-label">Land Price</span><span class="stat-value">$${(d.avg_land_price_usd_m2 || 0).toLocaleString()}/m²</span></div>
    <div class="stat-row"><span class="stat-label">Population</span><span class="stat-value">${(d.population || 0).toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-label">Elevation</span><span class="stat-value">${d.elevation_m || 0}m</span></div>
    <div class="stat-row"><span class="stat-label">Coastal</span><span class="stat-value">${d.coastal ? 'Yes' : 'No'}</span></div>
    <div class="stat-row"><span class="stat-label">Volcanic Proximity</span><span class="stat-value">${d.volcanic_proximity_km || '—'} km</span></div>
    <div class="stat-row"><span class="stat-label">Tourism Intensity</span><span class="stat-value">${((d.tourism_intensity || 0) * 100).toFixed(0)}%</span></div>
    <div class="stat-row"><span class="stat-label">Infrastructure</span><span class="stat-value">${((d.infrastructure_index || 0) * 100).toFixed(0)}%</span></div>
    <div class="stat-row"><span class="stat-label">Foreign Investor Density</span><span class="stat-value">${((d.foreign_investor_density || 0) * 100).toFixed(0)}%</span></div>
  `;
}

function riskBar(label, score) {
  const s = score || 0;
  const color = riskColor(s);
  return `
    <div style="margin:6px 0">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
        <span style="color:#888">${label}</span>
        <span style="color:${color};font-weight:600">${s.toFixed(1)}</span>
      </div>
      <div class="risk-bar">
        <div class="risk-bar-fill" style="width:${s}%;background:${color}"></div>
      </div>
    </div>`;
}

function filterDistricts(query) {
  const q = query.toLowerCase();
  districtMarkers.forEach(m => {
    const d = m.districtData;
    const match = !q || d.name.toLowerCase().includes(q) || d.regency.toLowerCase().includes(q);
    m.setStyle({ fillOpacity: match ? 0.7 : 0.1, opacity: match ? 1 : 0.2 });
  });
}
