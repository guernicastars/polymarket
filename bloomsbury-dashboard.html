function AnimatedCounter({ target, duration = 2000, decimals = 1, suffix = '' }) {
  const [value, setValue] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started.current) {
        started.current = true;
        const startTime = Date.now();
        const animate = () => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setValue(target * eased);
          if (progress < 1) requestAnimationFrame(animate);
        };
        animate();
      }
    }, { threshold: 0.3 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target, duration]);

  return <span ref={ref}>{value.toFixed(decimals)}{suffix}</span>;
}

function FadeIn({ children, delay = 0, className = '' }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setTimeout(() => setVisible(true), delay);
        observer.disconnect();
      }
    }, { threshold: 0.15 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [delay]);

  return (
    <div ref={ref} className={`fade-in ${visible ? 'visible' : ''} ${className}`}>
      {children}
    </div>
  );
}

// ─── Globe with Three.js ────────────────────────────

function Globe() {
  const canvasRef = useRef(null);
  const sceneRef = useRef(null);

  useEffect(() => {
    const container = canvasRef.current;
    if (!container) return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 3.2;

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Globe wireframe
    const globeGeo = new THREE.SphereGeometry(1, 48, 48);
    const globeMat = new THREE.MeshBasicMaterial({
      color: 0x1a1a2e,
      wireframe: true,
      transparent: true,
      opacity: 0.15
    });
    const globe = new THREE.Mesh(globeGeo, globeMat);
    scene.add(globe);

    // Solid inner globe
    const innerGeo = new THREE.SphereGeometry(0.98, 48, 48);
    const innerMat = new THREE.MeshBasicMaterial({
      color: 0x0a0a14,
      transparent: true,
      opacity: 0.8
    });
    scene.add(new THREE.Mesh(innerGeo, innerMat));

    // Glow ring
    const ringGeo = new THREE.RingGeometry(1.01, 1.03, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xD4A843,
      transparent: true,
      opacity: 0.1,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    scene.add(ring);

    // Convert lat/lon to 3D
    function latLonToVec3(lat, lon, r = 1.01) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lon + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    }

    // Conflict hotspots
    CONFLICT_HOTSPOTS.forEach(h => {
      const pos = latLonToVec3(h.lat, h.lon, 1.02);
      const dotGeo = new THREE.SphereGeometry(0.015 + h.intensity * 0.01, 12, 12);
      const dotMat = new THREE.MeshBasicMaterial({ color: 0xC0392B });
      const dot = new THREE.Mesh(dotGeo, dotMat);
      dot.position.copy(pos);
      scene.add(dot);

      // Glow
      const glowGeo = new THREE.SphereGeometry(0.03 + h.intensity * 0.02, 12, 12);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0xC0392B,
        transparent: true,
        opacity: 0.2
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.copy(pos);
      glow.userData = { baseScale: 1, phase: Math.random() * Math.PI * 2 };
      scene.add(glow);
    });

    // Asset hubs (diamond-ish)
    ASSET_HUBS.forEach(h => {
      const pos = latLonToVec3(h.lat, h.lon, 1.02);
      const geo = new THREE.OctahedronGeometry(0.015, 0);
      const mat = new THREE.MeshBasicMaterial({ color: 0x4ECDC4 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      scene.add(mesh);
    });

    // Flow arcs
    CAPITAL_FLOWS.forEach(flow => {
      const start = latLonToVec3(flow.from[0], flow.from[1], 1.02);
      const end = latLonToVec3(flow.to[0], flow.to[1], 1.02);
      const mid = start.clone().add(end).multiplyScalar(0.5);
      mid.normalize().multiplyScalar(1.3);

      const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
      const points = curve.getPoints(40);
      const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
      const lineMat = new THREE.LineBasicMaterial({
        color: 0xD4A843,
        transparent: true,
        opacity: 0.25
      });
      scene.add(new THREE.Line(lineGeo, lineMat));
    });

    // Fault line rings (approximations of civilizational boundaries)
    function addFaultLine(points, color) {
      const vecs = points.map(([lat, lon]) => latLonToVec3(lat, lon, 1.015));
      const curve = new THREE.CatmullRomCurve3(vecs, false);
      const curvePoints = curve.getPoints(80);
      const geo = new THREE.BufferGeometry().setFromPoints(curvePoints);
      const mat = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.4
      });
      scene.add(new THREE.Line(geo, mat));
    }

    // Western-Orthodox fault line
    addFaultLine([
      [70, 30], [65, 28], [60, 25], [55, 22], [50, 24],
      [48, 28], [46, 30], [44, 28], [42, 26], [40, 22],
      [38, 20]
    ], 0xD4A843);

    // Western-Islamic
    addFaultLine([
      [36, -5], [35, 0], [36, 10], [34, 15], [32, 20],
      [30, 25], [28, 30], [25, 35], [22, 40]
    ], 0xC0392B);

    // Animate
    let frameId;
    const clock = new THREE.Clock();
    function animate() {
      frameId = requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      globe.rotation.y = t * 0.08;
      innerGeo.groups && (innerGeo.groups.length = 0);

      scene.children.forEach(child => {
        if (child.userData && child.userData.phase !== undefined) {
          const s = 1 + 0.3 * Math.sin(t * 2 + child.userData.phase);
          child.scale.setScalar(s);
          child.material.opacity = 0.15 + 0.1 * Math.sin(t * 2 + child.userData.phase);
        }
        if (child.geometry && child.geometry.type === 'OctahedronGeometry') {
          child.rotation.y = t * 0.5;
        }
      });

      // Rotate everything together
      scene.rotation.y = t * 0.05;

      renderer.render(scene, camera);
    }
    animate();

    const handleResize = () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    };
    window.addEventListener('resize', handleResize);

    return () => {
      cancelAnimationFrame(frameId);
      window.removeEventListener('resize', handleResize);
      container.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, []);

  return <div ref={canvasRef} className="hero-canvas" />;
}

// ─── Sparkline ──────────────────────────────────────

function Sparkline({ data, width = 500, height = 60, color = '#D4A843' }) {
  const svgRef = useRef(null);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const x = d3.scaleLinear().domain([0, data.length - 1]).range([0, width]);
    const y = d3.scaleLinear().domain([d3.min(data) - 5, d3.max(data) + 5]).range([height - 4, 4]);

    const area = d3.area()
      .x((d, i) => x(i))
      .y0(height)
      .y1((d) => y(d))
      .curve(d3.curveMonotoneX);

    const line = d3.line()
      .x((d, i) => x(i))
      .y((d) => y(d))
      .curve(d3.curveMonotoneX);

    const gradient = svg.append('defs').append('linearGradient')
      .attr('id', 'sparkGrad')
      .attr('x1', '0%').attr('y1', '0%')
      .attr('x2', '0%').attr('y2', '100%');
    gradient.append('stop').attr('offset', '0%').attr('stop-color', color).attr('stop-opacity', 0.2);
    gradient.append('stop').attr('offset', '100%').attr('stop-color', color).attr('stop-opacity', 0);

    svg.append('path').datum(data).attr('d', area).attr('fill', 'url(#sparkGrad)');
    svg.append('path').datum(data).attr('d', line)
      .attr('fill', 'none').attr('stroke', color).attr('stroke-width', 1.5);

    // End dot
    svg.append('circle')
      .attr('cx', x(data.length - 1))
      .attr('cy', y(data[data.length - 1]))
      .attr('r', 3)
      .attr('fill', color);
  }, [data, width, height, color]);

  return (
    <div className="sparkline-container">
      <svg ref={svgRef} width={width} height={height} style={{ display: 'block', margin: '0 auto' }} />
    </div>
  );
}

// ─── Conflict Map (D3) ─────────────────────────────

function ConflictMap() {
  const svgRef = useRef(null);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const width = svgRef.current.clientWidth || 1100;
    const height = 450;

    const projection = d3.geoNaturalEarth1()
      .scale(width / 5.5)
      .translate([width / 2, height / 2]);

    // Draw graticule
    const graticule = d3.geoGraticule().step([20, 20]);
    svg.append('path')
      .datum(graticule())
      .attr('d', d3.geoPath().projection(projection))
      .attr('fill', 'none')
      .attr('stroke', 'rgba(255,255,255,0.04)')
      .attr('stroke-width', 0.5);

    // Outline
    svg.append('path')
      .datum({ type: 'Sphere' })
      .attr('d', d3.geoPath().projection(projection))
      .attr('fill', 'none')
      .attr('stroke', 'rgba(212, 168, 67, 0.1)')
      .attr('stroke-width', 1);

    // Conflict hotspots
    CONFLICT_HOTSPOTS.forEach((h, i) => {
      const [x, y] = projection([h.lon, h.lat]);
      if (!x || !y) return;

      // Pulsing outer ring
      const pulse = svg.append('circle')
        .attr('cx', x).attr('cy', y)
        .attr('r', 8 + h.intensity * 20)
        .attr('fill', 'none')
        .attr('stroke', '#C0392B')
        .attr('stroke-width', 1)
        .attr('opacity', 0);

      function doPulse() {
        pulse
          .attr('r', 4).attr('opacity', 0.6)
          .transition().duration(2000).delay(i * 300)
          .attr('r', 8 + h.intensity * 25).attr('opacity', 0)
          .on('end', doPulse);
      }
      doPulse();

      // Core dot
      svg.append('circle')
        .attr('cx', x).attr('cy', y)
        .attr('r', 3 + h.intensity * 4)
        .attr('fill', '#C0392B')
        .attr('opacity', 0.7 + h.intensity * 0.3);

      // Label
      svg.append('text')
        .attr('x', x + 10 + h.intensity * 5).attr('y', y + 4)
        .text(h.name)
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', '10px')
        .attr('fill', 'rgba(232,230,227,0.5)')
        .attr('letter-spacing', '1px');
    });

    // Asset hubs
    ASSET_HUBS.forEach(h => {
      const [x, y] = projection([h.lon, h.lat]);
      if (!x || !y) return;

      // Diamond
      svg.append('rect')
        .attr('x', x - 4).attr('y', y - 4)
        .attr('width', 8).attr('height', 8)
        .attr('fill', '#4ECDC4')
        .attr('opacity', 0.8)
        .attr('transform', `rotate(45, ${x}, ${y})`);

      svg.append('text')
        .attr('x', x + 10).attr('y', y + 3)
        .text(h.name)
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', '9px')
        .attr('fill', 'rgba(78,205,196,0.6)')
        .attr('letter-spacing', '1px');
    });

    // Flow arrows
    CAPITAL_FLOWS.forEach((flow, i) => {
      const start = projection([flow.from[1], flow.from[0]]);
      const end = projection([flow.to[1], flow.to[0]]);
      if (!start || !end) return;

      const midX = (start[0] + end[0]) / 2;
      const midY = (start[1] + end[1]) / 2 - 30;

      const path = svg.append('path')
        .attr('d', `M${start[0]},${start[1]} Q${midX},${midY} ${end[0]},${end[1]}`)
        .attr('fill', 'none')
        .attr('stroke', 'rgba(212, 168, 67, 0.2)')
        .attr('stroke-width', 1.5)
        .attr('stroke-dasharray', '4,6');

      // Animated particle along path
      const totalLength = path.node().getTotalLength();
      const particle = svg.append('circle')
        .attr('r', 2)
        .attr('fill', '#D4A843')
        .attr('opacity', 0.8);

      function moveParticle() {
        particle
          .attr('opacity', 0.8)
          .transition()
          .duration(3000 + i * 500)
          .delay(i * 400)
          .attrTween('transform', function() {
            return function(t) {
              const p = path.node().getPointAtLength(t * totalLength);
              return `translate(${p.x},${p.y})`;
            };
          })
          .attr('opacity', 0)
          .on('end', moveParticle);
      }
      moveParticle();
    });
  }, []);

  return (
    <div className="conflict-map-container">
      <svg ref={svgRef} className="conflict-map" style={{ width: '100%', height: '450px' }} />
    </div>
  );
}

// ─── Flow Diagram ───────────────────────────────────

function FlowDiagram({ tension }) {
  const svgRef = useRef(null);
  const prevTension = useRef(tension);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const width = svgRef.current.clientWidth || 1000;
    const height = 500;
    const padLeft = 160;
    const padRight = 160;
    const flowWidth = width - padLeft - padRight;

    // Calculate tension multiplier: at 0 tension, flows are thin; at 100, much wider
    const tensionMult = 0.4 + (tension / 100) * 1.2;
    // At higher tension, more goes to alt assets, less to real estate
    const altBoost = 1 + (tension / 100) * 0.6;
    const reBoost = 1 - (tension / 100) * 0.3;

    const sources = FLOW_DATA.sources;
    const dests = FLOW_DATA.destinations;

    const totalSourceValue = sources.reduce((s, d) => s + d.base * tensionMult, 0);

    // Source y positions
    const sourceGap = 12;
    const totalSourceHeight = height - (sources.length - 1) * sourceGap;
    let sourceY = 0;
    const sourcePositions = sources.map(s => {
      const h = (s.base * tensionMult / totalSourceValue) * totalSourceHeight;
      const pos = { ...s, y: sourceY, h, mid: sourceY + h / 2, flowValue: s.base * tensionMult };
      sourceY += h + sourceGap;
      return pos;
    });

    // Destination y positions
    const destGap = 10;
    const adjustedDests = dests.map(d => ({
      ...d,
      adjustedShare: d.name === 'Real Estate' ? d.share * reBoost : d.share * altBoost
    }));
    const totalDestShare = adjustedDests.reduce((s, d) => s + d.adjustedShare, 0);
    const totalDestHeight = height - (dests.length - 1) * destGap;
    let destY = 0;
    const destPositions = adjustedDests.map(d => {
      const h = (d.adjustedShare / totalDestShare) * totalDestHeight;
      const pos = { ...d, y: destY, h, mid: destY + h / 2 };
      destY += h + destGap;
      return pos;
    });

    // Draw flows
    const g = svg.append('g').attr('transform', `translate(${padLeft}, 0)`);

    sourcePositions.forEach((src, si) => {
      let srcOffset = 0;
      destPositions.forEach((dst, di) => {
        const flowH = src.h * (dst.adjustedShare / totalDestShare);
        const dstShare = src.flowValue * (dst.adjustedShare / totalDestShare);
        const dstH = (dstShare / (totalSourceValue * dst.adjustedShare / totalDestShare)) * dst.h;

        const x0 = 0;
        const x1 = flowWidth;
        const y0top = src.y + srcOffset;
        const y0bot = y0top + flowH;

        // We need to track dest offsets
        if (!dst._offset) dst._offset = 0;
        const y1top = dst.y + dst._offset;
        const y1bot = y1top + dstH;
        dst._offset += dstH;

        const path = `M${x0},${y0top} C${flowWidth*0.4},${y0top} ${flowWidth*0.6},${y1top} ${x1},${y1top}
                       L${x1},${y1bot} C${flowWidth*0.6},${y1bot} ${flowWidth*0.4},${y0bot} ${x0},${y0bot} Z`;

        g.append('path')
          .attr('d', path)
          .attr('fill', src.color)
          .attr('opacity', 0.15 + (tension / 100) * 0.15)
          .attr('stroke', src.color)
          .attr('stroke-width', 0.3)
          .attr('stroke-opacity', 0.3);

        srcOffset += flowH;
      });
    });

    // Source labels
    sourcePositions.forEach(src => {
      svg.append('text')
        .attr('x', padLeft - 14)
        .attr('y', src.mid + 4)
        .attr('text-anchor', 'end')
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', '11px')
        .attr('fill', 'rgba(232,230,227,0.7)')
        .text(src.name);

      svg.append('text')
        .attr('x', padLeft - 14)
        .attr('y', src.mid + 18)
        .attr('text-anchor', 'end')
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', '10px')
        .attr('fill', src.color)
        .attr('opacity', 0.8)
        .text(`$${(src.base * tensionMult).toFixed(1)}B`);
    });

    // Destination labels
    destPositions.forEach(dst => {
      svg.append('text')
        .attr('x', padLeft + flowWidth + 14)
        .attr('y', dst.mid + 4)
        .attr('text-anchor', 'start')
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', '11px')
        .attr('fill', dst.name === 'Real Estate' ? 'rgba(232,230,227,0.4)' : 'rgba(232,230,227,0.7)')
        .text(dst.name);

      const pct = (dst.adjustedShare / totalDestShare * 100).toFixed(0);
      svg.append('text')
        .attr('x', padLeft + flowWidth + 14)
        .attr('y', dst.mid + 18)
        .attr('text-anchor', 'start')
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', '10px')
        .attr('fill', dst.name === 'Real Estate' ? 'rgba(232,230,227,0.3)' : '#4ECDC4')
        .attr('opacity', 0.8)
        .text(`${pct}%`);
    });

    prevTension.current = tension;
  }, [tension]);

  return <svg ref={svgRef} style={{ width: '100%', height: '500px' }} />;
}
